name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Sync manifest version from tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          jq --arg v "$VERSION" '.version = $v' manifest.json > manifest.tmp && mv manifest.tmp manifest.json

      - name: Create ZIP
        run: |
          zip -r web-annotator.zip . \
            -x ".git" \
            -x ".git/*" \
            -x ".github/*" \
            -x "scripts/*" \
            -x "screenshots/*" \
            -x "README.md" \
            -x "PRIVACY.md" \
            -x "LICENSE"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: web-annotator.zip
          generate_release_notes: true
